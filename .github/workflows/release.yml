name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download SFML
        run: |
          Invoke-WebRequest -Uri "https://github.com/SFML/SFML/releases/download/3.0.2/SFML-3.0.2-Windows.VS2022.x64.zip" -OutFile sfml.zip
          Expand-Archive sfml.zip -DestinationPath C:/
        shell: pwsh

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        env:
          SFML_DIR: C:/SFML-3.0.2

      - name: Build Release
        run: cmake --build build

      - name: Package Build
        run: |
          mkdir release
          Copy-Item build/JourneyToTheClouds.exe release/
          Copy-Item -Recurse assets release/assets
          if (Test-Path lib/*.dll) { Copy-Item lib/*.dll release/ -ErrorAction SilentlyContinue }
          Compress-Archive -Path release/* -DestinationPath "JourneyToTheClouds-${{ github.ref_name }}-win64.zip"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: JourneyToTheClouds-${{ github.ref_name }}-win64.zip
          generate_release_notes: true

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxrandr-dev libxcursor-dev libudev-dev libopenal-dev libflac-dev libvorbis-dev libgl1-mesa-dev libegl1-mesa-dev

      - name: Download SFML
        run: |
          wget https://github.com/SFML/SFML/releases/download/3.0.2/SFML-3.0.2-Linux.GCC.tar.gz -O sfml.tar.gz
          mkdir -p /opt/SFML
          tar -xzf sfml.tar.gz -C /opt/SFML --strip-components=1

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
        env:
          SFML_DIR: /opt/SFML

      - name: Build Release
        run: cmake --build build

      - name: Package Build
        run: |
          mkdir release
          cp build/JourneyToTheClouds release/
          cp -r assets release/assets
          cd release && tar -czvf ../JourneyToTheClouds-${{ github.ref_name }}-linux64.tar.gz *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: JourneyToTheClouds-${{ github.ref_name }}-linux64.tar.gz

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download SFML
        run: |
          curl -L "https://github.com/SFML/SFML/releases/download/3.0.2/SFML-3.0.2-macOS.arm64.tar.gz" -o sfml.tar.gz
          mkdir -p /Users/runner/SFML
          tar -xzf sfml.tar.gz -C /Users/runner/SFML --strip-components=1

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
        env:
          SFML_DIR: /Users/runner/SFML

      - name: Build Release
        run: cmake --build build

      - name: Package Build
        run: |
          mkdir release
          cp build/JourneyToTheClouds release/
          cp -r assets release/assets
          cd release && zip -r ../JourneyToTheClouds-${{ github.ref_name }}-macos-arm64.zip *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: JourneyToTheClouds-${{ github.ref_name }}-macos-arm64.zip
